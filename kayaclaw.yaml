#   resources:
#     requests:
#       storage: 1Gi
#   storageClassName: nfs-csi

---
apiVersion: v1
kind: Service
metadata:
  name: kayaclaw-svc
  namespace: dev
  labels:
    app: kudams
spec:
  type: ClusterIP
  ports:
    - port: 18789
      targetPort: 18789
      protocol: TCP
      name: http
  selector:
    app: kudams
