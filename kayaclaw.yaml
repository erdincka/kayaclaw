apiVersion: v1
kind: Pod
metadata:
  name: kayaclaw
  namespace: dev
  labels:
    app: kudams
spec:
  restartPolicy: Never
  containers:
  - name: claw
    image: registry.ai-application.garage.dubai/kayaclaw:latest
    securityContext:
      privileged: true
    volumeMounts:
    - name: docker-storage
      mountPath: /var/lib/docker
    ports:
      - name: http
        containerPort: 8000
        protocol: TCP
    resources:
        limits:
          cpu: 4000m
          memory: 4Gi
        requests:
          cpu: 2000m
          memory: 2Gi
  volumes:
  - name: docker-storage
    persistentVolumeClaim:
      claimName: dockerfile-pvc
